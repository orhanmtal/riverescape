<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>River Escape Elite - Official Landing Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00e5ff;
            --bg: #050a15;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text: #ffffff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 800px;
            z-index: 2;
        }

        h1 {
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: 900;
            margin: 0;
            background: linear-gradient(135deg, #fff 20%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.8;
            margin: 20px 0 40px;
        }

        .cta-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .play-store-btn {
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .play-store-btn:hover {
            transform: scale(1.05);
        }

        .play-store-btn img {
            height: 64px;
        }

        .contact-info {
            margin-top: 60px;
            font-size: 0.9rem;
            opacity: 0.5;
        }

        .contact-info a {
            color: var(--primary);
            text-decoration: none;
        }

        .links {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }

        .links a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .links a:hover {
            color: var(--primary);
        }

        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.05) 0%, transparent 70%);
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <h1>RIVER ESCAPE<br>ELITE</h1>
        <p>The ultimate high-speed river survival experience. Dodge, blast, and survive the toxic currents.</p>
        
        <div class="cta-container">
            <a href="https://play.google.com/store/apps/details?id=com.gemini.riverescape" class="play-store-btn" target="_blank">
                <img src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" alt="Get it on Google Play">
            </a>
        </div>

        <div class="contact-info">
            Contact Support: <a href="mailto:orhanmtal@gmail.com">orhanmtal@gmail.com</a>
        </div>

        <div class="links">
            <a href="privacy.html">Privacy Policy</a>
        </div>
    </div>
</body>
</html>
